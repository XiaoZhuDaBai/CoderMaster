global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'oj-microservice'
    environment: 'production'

# Alertmanager 配置（可选）
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#           - alertmanager:9093

# 规则文件（可选）
# rule_files:
#   - "alert_rules.yml"

scrape_configs:
  # Prometheus 自身监控
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # AI 服务监控
  - job_name: 'ai-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8084']
        labels:
          service: 'ai-service'
          application: 'oj-ai-service'

  # 判题服务监控
  - job_name: 'judge-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8085']
        labels:
          service: 'judge-service'
          application: 'oj-judge-service'

  # 提交服务监控
  - job_name: 'submission-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8083']
        labels:
          service: 'submission-service'
          application: 'oj-submission-service'

  # 题目服务监控
  - job_name: 'problem-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8082']
        labels:
          service: 'problem-service'
          application: 'oj-problem-service'

  # RabbitMQ 监控（使用 rabbitmq_exporter）
  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['rabbitmq-exporter:9419']
        labels:
          service: 'rabbitmq'

  # Docker 容器监控（使用 cAdvisor）
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8089']
        labels:
          service: 'docker-containers'
    # 注意：如果 cAdvisor 端口不是 8080，请修改上面的端口号

