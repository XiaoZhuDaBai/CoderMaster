global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'oj-microservice'
    environment: 'production'

scrape_configs:
  # Prometheus 自身监控 (容器内使用 localhost 访问自己)
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # API 网关 (使用 host.docker.internal 访问宿主机上的 IDE 服务)
  - job_name: 'gateway'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8080']
        labels:
          service: 'gateway'

  # 用户服务
  - job_name: 'user-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8081']
        labels:
          service: 'user-service'

  # 题目服务
  - job_name: 'problem-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8082']
        labels:
          service: 'problem-service'

  # 提交服务
  - job_name: 'submission-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8083']
        labels:
          service: 'submission-service'

  # AI 服务
  - job_name: 'ai-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8084']
        labels:
          service: 'ai-service'

  # 判题服务
  - job_name: 'judge-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8085']
        labels:
          service: 'judge-service'

  # 竞赛服务
  - job_name: 'contest-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8086']
        labels:
          service: 'contest-service'
